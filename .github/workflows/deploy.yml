name: Build and Deploy via Plesk Git

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore WorshipSearch.csproj

      - name: Publish
        run: dotnet publish WorshipSearch.csproj -c Release -o ./publish

      - name: Push artifacts to deploy branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin deploy
          git checkout deploy
          git rm -rf . --quiet
          cp -r ./publish/. .
          git add -A
          git commit -m "Deploy from master $(git rev-parse --short origin/master)" || echo "Nothing to commit"
          git push origin deploy

      - name: Notify Plesk webhook
        run: |
          curl -sk "https://P3NWVPWEB180.shr.prod.phx3.secureserver.net:8443/modules/git/public/web-hook.php?uuid=47a8cf49-22ef-e22c-429d-3fe563d44a8e" || true
