name: Build and Deploy via FTP

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore WorshipSearch.csproj

      - name: Build
        run: dotnet build WorshipSearch.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish WorshipSearch.csproj -c Release -o ./publish --no-build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: p3nwvpweb180.shr.prod.phx3.secureserver.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /httpdocs/
          protocol: ftp
          port: 21
